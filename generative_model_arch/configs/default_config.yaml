# Hyperparameters: ambient dim (p), intrinsic dim (d), 
# regularity (beta), number of charts (m), num_time_steps.
# Hyperparameters for Minimax-Optimal KSI Pipeline
manifold:
  ambient_dim: 16       # Ambient embedding space R^p
  intrinsic_dim: 2      # Strict Riemannian surface dimension d=2
  num_samples: 5000     # Sample complexity N (Sweep across [1000, 2000, 5000, 10000])

geometry:
  num_charts: 64        # CRITICAL: Must be sufficiently large (64-128) to guarantee localized differential covering nets (\delta \ll diam(M))

features:
  p_trunc: 256          # Littlewood-Paley Besov frequency truncation ladder P

integration:
  time_steps: 200